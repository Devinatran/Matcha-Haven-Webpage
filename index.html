<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcha Haven — Store Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <header>
        <div class="header-brand">
            <svg class="brand-leaf" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M20 40 C20 40 3 29 3 16 C3 7.5 10 2 20 2 C30 2 37 7.5 37 16 C37 29 20 40 20 40Z"
                      stroke="currentColor" stroke-width="1.4" fill="none"/>
                <line x1="20" y1="40" x2="20" y2="8"  stroke="currentColor" stroke-width="0.9"/>
                <line x1="20" y1="21" x2="11" y2="15" stroke="currentColor" stroke-width="0.7"/>
                <line x1="20" y1="28" x2="29" y2="22" stroke="currentColor" stroke-width="0.7"/>
            </svg>
            <div class="brand-text">
                <span class="brand-name">Matcha Haven</span>
                <span class="brand-sub">Store Products</span>
            </div>
        </div>
        <nav class="header-nav">
            <a href="index.html">← Back to Site</a>
        </nav>
    </header>
 
    <div class="dashboard-hero">
        <p class="hero-kana">抹茶の世界へ</p>
        <h1>Our Matcha Menu</h1>
        <p class="hero-tagline">Sourced from Uji — curated for you</p>
        <div class="hero-rule">
            <span class="rule-line"></span>
            <span class="rule-gem">✦</span>
            <span class="rule-line"></span>
        </div>
    </div>
 
    <main>
        <div id="product-container">
            <p class="loading-msg">Preparing your collection…</p>
        </div>
    </main>
 
    <footer>
        <svg class="brand-leaf small" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 40 C20 40 3 29 3 16 C3 7.5 10 2 20 2 C30 2 37 7.5 37 16 C37 29 20 40 20 40Z"
                  stroke="currentColor" stroke-width="1.6" fill="none"/>
            <line x1="20" y1="40" x2="20" y2="8" stroke="currentColor" stroke-width="1"/>
        </svg>
        <p>© 2024 Matcha Haven. All rights reserved.</p>
    </footer>
 
    <script src="cp_2.js"></script>
 
</body>
</html>
